{% extends 'checklist/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card p-4">
            <h5 class="fw-bold mb-4" style="color: #003366;">Selecione o Polo</h5>

            {% if polos %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Polo a ser avaliado</label>
                        <select name="polo_id" class="form-select" required>
                            <option value="">-- Selecione --</option>
                            {% for polo in polos %}
                                <option value="{{ polo.id }}">{{ polo.nome }} - {{ polo.cidade }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Iniciar Avaliação</button>
                </form>
            {% else %}
                <div class="alert alert-warning">
                    Nenhum polo foi atribuído ao seu usuário ainda. 
                    Entre em contato com o administrador.
                </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
